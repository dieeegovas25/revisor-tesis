# ==============================================================
# REVISOR DE TESIS — Docker Compose Producción
# Orquestación completa de servicios locales e infraestructura
# ==============================================================
# Uso: docker compose -f docker-compose.prod.yml up -d --build
# ==============================================================

services:
  # ─── MySQL 8.x (Base de Datos Relacional) ─────────────────────
  mysql:
    image: mysql:8.0
    container_name: revisor-mysql-prod
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./docker/init/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - revisor-prod-net

  # ─── Redis 7 (Colas BullMQ) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: revisor-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revisor-prod-net

  # ─── MinIO (Almacenamiento de Archivos S3) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: revisor-minio-prod
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_prod_data:/data
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revisor-prod-net

  # ─── MinIO Init (Crear buckets automáticamente) ──────────────
  minio-init:
    image: minio/mc:latest
    container_name: revisor-minio-init-prod
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing myminio/${MINIO_BUCKET_DOCUMENTS:-thesis-documents};
        mc mb --ignore-existing myminio/${MINIO_BUCKET_PATTERNS:-thesis-patterns};
        mc anonymous set download myminio/${MINIO_BUCKET_DOCUMENTS:-thesis-documents};
        echo 'Buckets creados exitosamente';
        exit 0;
      "
    networks:
      - revisor-prod-net

  # ─── Qdrant (Base de Datos Vectorial para Embeddings) ────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: revisor-qdrant-prod
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_prod_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revisor-prod-net

  # ─── API Backend (NestJS Server) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: revisor-api-prod
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS}
      MINIO_BUCKET_PATTERNS: ${MINIO_BUCKET_PATTERNS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    networks:
      - revisor-prod-net

  # ─── Workers Backend (BullMQ / Gemini / Plagiarism / CrossRef) ─
  workers:
    build:
      context: .
      dockerfile: packages/workers/Dockerfile
    container_name: revisor-workers-prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS}
      MINIO_BUCKET_PATTERNS: ${MINIO_BUCKET_PATTERNS}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      # Persistencia del modelo ONNX de HuggingFace (~250MB) para evitar descargas repetitivas
      - transformers_prod_cache:/app/.transformers-cache
    networks:
      - revisor-prod-net

  # ─── Frontend Web (Next.js Application) ──────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: revisor-web-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      PORT: 3000
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      # Apunta a la API interna por el nombre de servicio de Docker Compose
      INTERNAL_API_URL: http://api:3001
    networks:
      - revisor-prod-net

# ─── Volúmenes Persistentes ──────────────────────────────────
volumes:
  mysql_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  minio_prod_data:
    driver: local
  qdrant_prod_data:
    driver: local
  transformers_prod_cache:
    driver: local

# ─── Red Interna de Producción ───────────────────────────────
networks:
  revisor-prod-net:
    driver: bridge
